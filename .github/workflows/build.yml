name: Build and Test

on:
  push:
    branches:
      - master
      - main
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -C debuginfo=line-tables-only --cfg=web_sys_unstable_apis
  APPIMAGE_EXTRACT_AND_RUN: "1"

jobs:
  build-linux:
    name: Build and Test (Linux x86_64)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: true

      - uses: ./.github/actions/prepare_environment
        with:
          target_os: linux
          is_self_hosted: false
          install_release_deps: true

      - name: Install linuxdeploy
        run: ./script/linux/install_linuxdeploy

      - name: Install cargo nextest
        uses: taiki-e/install-action@9a29ce630c67077a359246f3e4f84941e05f28b5 # v1
        with:
          tool: nextest

      - name: Install test shells
        run: sudo apt-get install -y zsh fish

      - name: Build OSS AppImage
        id: bundle
        run: |
          ./script/bundle --channel oss --packages appimage --artifact app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify AppImage exists
        run: |
          ls -lh target/release-lto/bundle/linux/*.AppImage

      # ── Artifact Upload ──────────────────────────────────────────────────

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: warp-oss-linux-x86_64
          path: target/release-lto/bundle/linux/*.AppImage
          retention-days: 7

      # ── Tests ────────────────────────────────────────────────────────────

      - name: Run unit tests
        run: |
          cargo nextest run --workspace --locked --exclude command-signatures-v2 -E "not package(integration)"
        env:
          WARP_SHELL_PATH: /usr/bin/zsh

      - name: Run doc tests
        run: |
          cargo test --workspace --locked --exclude command-signatures-v2 --doc
